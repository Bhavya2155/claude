<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akram Express | Magazines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">

    <!-- Main Container -->
    <div id="grid-view" class="container mx-auto px-4 py-8 max-w-7xl">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-5xl font-bold text-red-600 mb-8">Magazines</h1>
            
            <!-- Filters Section -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <!-- Language Filter -->
                <div class="relative">
                    <select id="language-filter" class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-red-500">
                        <option value="">All Languages</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-700">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                        </svg>
                    </div>
                </div>

                <!-- Year Filter -->
                <div class="relative">
                    <select id="year-filter" class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-red-500">
                        <option value="">All Year</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-700">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                        </svg>
                    </div>
                </div>

                <!-- Month Filter -->
                <div class="relative">
                    <select id="month-filter" class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-red-500">
                        <option value="">All Months</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-700">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                        </svg>
                    </div>
                </div>

                <!-- Search Box -->
                <div class="relative">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search here..." 
                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
                    />
                    <button class="absolute inset-y-0 right-0 px-4 bg-orange-500 text-white rounded-r-lg hover:bg-orange-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Magazine Grid -->
        <div id="magazine-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Dynamically populated -->
        </div>

        <!-- No Results Message -->
        <div id="no-results" class="hidden text-center py-20">
            <p class="text-gray-500 text-xl">No magazines found matching your criteria.</p>
        </div>
    </div>

    <!-- Flipbook Viewer -->
    <div id="flipbook-view" class="fixed inset-0 bg-black z-50 hidden flex-col items-center justify-center">
        
        <!-- Close Button -->
        <button id="close-flipbook" class="fixed top-6 right-6 text-white/60 hover:text-white transition z-[110] text-3xl font-light">
            ✕
        </button>

        <!-- Flipbook Container -->
        <div id="canvas" class="relative w-full h-full flex flex-col items-center justify-center p-4">
            <div id="flipbook-wrapper" class="relative">
                <div id="magazine" class="st-page-flip"></div>
            </div>

            <!-- Page Counter -->
            <div class="mt-8 z-[110]">
                <div class="bg-white/10 backdrop-blur-md rounded-full px-8 py-3 border border-white/20">
                    <span id="page-counter" class="text-sm font-medium tracking-wider text-white">0 / 0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio -->
    <audio id="flip-sound" src="flip.mp3" preload="auto"></audio>
    
    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
