<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gnan Mandir | Magazines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">

    <header class="w-full flex flex-col items-center pt-8 mb-12">
        <div class="mb-6">
            <img src="logo.png" alt="Gnan Mandir Logo" class="h-16 md:h-20 object-contain drop-shadow-sm">
        </div>
        <div class="w-full bg-black py-4 flex flex-col items-center justify-center border-b-4 border-orange-500">
            <h1 class="text-3xl md:text-4xl font-bold text-white uppercase tracking-[0.25em]">Magazines</h1>
        </div>
    </header>

    <div id="grid-view" class="container mx-auto px-4 max-w-7xl">
        <div id="magazine-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 bg-[#e5e7eb] z-50 hidden flex-col">
        <button id="close-flipbook" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full text-gray-800 shadow-md flex items-center justify-center z-[110] text-xl font-bold">✕</button>
        
        <div id="flipbook-wrapper" class="flex-1 relative w-full flex items-center justify-center p-4 overflow-hidden">
            <div id="magazine" class="st-page-flip"></div>
        </div>

        <div class="h-24 bg-white border-t border-gray-300 shadow-lg flex items-center justify-center gap-8 px-4 z-[110]">
            <button id="prev-page" class="px-8 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg font-bold transition-all active:scale-95">Previous</button>
            <div class="bg-gray-50 px-8 py-2.5 rounded-full border-2 border-gray-200">
                <span id="page-counter" class="text-sm font-black tracking-widest text-gray-800">0 / 0</span>
            </div>
            <button id="next-page" class="px-8 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-bold transition-all active:scale-95">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
