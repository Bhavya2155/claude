<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gnan Mandir | Magazines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">

    <div id="grid-view" class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="mb-12">
            <div class="flex justify-center mb-8 mt-4">
                <img src="logo.png" alt="Logo" class="h-16 md:h-20 object-contain">
            </div>
            <div class="border-b border-gray-100 pb-4">
                <h1 class="text-3xl font-bold text-red-700 tracking-tight">Magazines</h1>
            </div>
        </header>
        <div id="magazine-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 bg-[#f5f5f7] z-50 hidden flex-col items-center opacity-0 transition-opacity duration-300">
        
        <button id="close-flipbook" class="absolute top-6 right-6 w-10 h-10 bg-black/5 hover:bg-black/10 rounded-full text-black flex items-center justify-center z-[120]">✕</button>
        
        <div id="flipbook-wrapper" class="w-full flex-grow flex items-center justify-center overflow-hidden">
            <div id="magazine" class="st-page-flip"></div>
        </div>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 h-14 px-3 bg-white/80 backdrop-blur-2xl border border-black/5 shadow-2xl rounded-2xl flex items-center gap-3 z-[110]">
            
            <button id="prev-page" class="h-10 px-4 text-sm font-semibold text-gray-700 hover:bg-black/5 rounded-xl transition-all active:scale-90">Prev</button>
            
            <div class="h-6 w-[1px] bg-black/10"></div>
            
            <button id="zoom-out" class="w-10 h-10 flex items-center justify-center text-xl font-bold text-gray-600 hover:bg-black/5 rounded-xl transition-all active:scale-90">−</button>
            <div class="px-2">
                <span id="page-counter" class="text-[10px] font-black text-gray-400 tracking-widest uppercase">0 / 0</span>
            </div>
            <button id="zoom-in" class="w-10 h-10 flex items-center justify-center text-xl font-bold text-gray-600 hover:bg-black/5 rounded-xl transition-all active:scale-90">+</button>
            
            <div class="h-6 w-[1px] bg-black/10"></div>
            
            <button id="next-page" class="h-10 px-4 text-sm font-semibold bg-orange-500 text-white rounded-xl shadow-lg shadow-orange-500/20 hover:bg-orange-600 transition-all active:scale-90">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
