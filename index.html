<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gnan Mandir | Magazines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">
    <div id="grid-view" class="container mx-auto px-4 py-2 max-w-7xl">
        <header class="mb-6 text-center">
            <div class="flex justify-center mb-4 mt-2"><img src="logo.png" alt="Logo" class="h-10 object-contain"></div>
            <div class="border-b border-gray-100 pb-2 text-left"><h1 class="text-xl font-bold text-red-700 uppercase">Magazines</h1></div>
        </header>
        <div id="magazine-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </div>

    <div id="flipbook-view">
        <button id="close-flipbook" class="absolute top-6 right-6 text-white/60 text-3xl">✕</button>
        <div id="flipbook-wrapper"></div>
        <div class="mb-10 w-full flex justify-center">
            <div class="h-12 px-6 flex items-center gap-8">
                <button id="btn-prev" class="text-white font-bold hover:text-orange-500 uppercase text-xs">Prev</button>
                <span id="page-counter" class="text-white/50 font-bold text-[11px]">0 / 0</span>
                <button id="btn-next" class="bg-orange-500 text-white px-8 py-2 rounded-md font-bold text-xs uppercase">Next</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
