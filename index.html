<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gnan Mandir | Magazines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">

    <div id="grid-view" class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="mb-12">
            <div class="flex justify-center mb-8 mt-4">
                <img src="logo.png" alt="Logo" class="h-16 md:h-20 object-contain drop-shadow-sm">
            </div>
            <div class="border-b-2 border-gray-100 pb-4">
                <h1 class="text-3xl font-bold text-red-700 tracking-tight">Magazines</h1>
            </div>
        </header>
        <div id="magazine-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 z-50 hidden flex-col items-center opacity-0 transition-opacity duration-300">
        
        <div class="absolute inset-0 bg-white/30 backdrop-blur-2xl -z-10"></div>
        
        <button id="close-flipbook" class="absolute top-6 right-6 w-10 h-10 bg-black/10 hover:bg-black/20 backdrop-blur-md rounded-full text-black flex items-center justify-center z-[120] border border-white/20 shadow-lg transition-all">✕</button>
        
        <div id="flipbook-wrapper" class="w-full flex-grow flex items-center justify-center overflow-hidden">
            <div id="magazine" class="st-page-flip"></div>
        </div>

        <div class="w-full flex justify-center pb-10 pt-2">
            <div class="h-12 px-2 bg-white/70 backdrop-blur-3xl border border-white/40 shadow-2xl rounded-2xl flex items-center gap-3">
                <button id="prev-page" class="h-9 px-5 text-sm font-semibold text-gray-800 hover:bg-black/5 rounded-xl transition-all active:scale-95">Prev</button>
                <div class="h-4 w-[1px] bg-black/10"></div>
                <span id="page-counter" class="px-2 text-[10px] font-black text-gray-400 uppercase tracking-widest">0 / 0</span>
                <div class="h-4 w-[1px] bg-black/10"></div>
                <button id="next-page" class="h-9 px-5 text-sm font-semibold bg-orange-500 text-white rounded-xl shadow-lg shadow-orange-500/20 hover:bg-orange-600 transition-all active:scale-95">Next</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
