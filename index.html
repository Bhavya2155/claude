<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akram Express | Magazines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">

    <div id="grid-view" class="container mx-auto px-4 py-8 max-w-7xl">
        
        <div class="w-full flex flex-col items-center justify-center mb-12 mt-4">
            <img src="logo.png" alt="Gnan Mandir Logo" class="h-28 md:h-36 object-contain mb-8 hover:scale-105 transition-transform duration-300 drop-shadow-sm">
            
            <h1 class="text-4xl md:text-5xl font-bold text-red-700 text-center uppercase tracking-wide">
                Magazines
            </h1>
            
            <div class="w-24 h-1 bg-orange-500 mt-6 rounded-full"></div>
        </div>

        <div id="magazine-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>

        <div id="no-results" class="hidden text-center py-20">
            <p class="text-gray-500 text-xl">No magazines found.</p>
        </div>
    </div>

    <div id="flipbook-view" class="fixed inset-0 bg-[#e5e7eb] z-50 hidden flex-col">
        
        <button id="close-flipbook" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full text-gray-800 shadow-md hover:bg-gray-100 flex items-center justify-center transition z-[110] text-xl font-bold">
            ✕
        </button>

        <div id="flipbook-wrapper" class="flex-1 relative w-full flex items-center justify-center p-4 overflow-hidden">
            <div id="magazine" class="st-page-flip"></div>
        </div>

        <div class="h-16 bg-white border-t border-gray-300 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex items-center justify-center gap-6 px-4 z-[110]">
            <button id="prev-page" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md font-semibold transition">
                Previous
            </button>
            <div class="bg-gray-50 px-6 py-2 rounded-full border border-gray-200">
                <span id="page-counter" class="text-sm font-bold tracking-wider text-gray-700">0 / 0</span>
            </div>
            <button id="next-page" class="px-6 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-md font-semibold transition">
                Next
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
